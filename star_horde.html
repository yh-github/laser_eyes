<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Horde - Laser Eyes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="shared.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.js" onerror="window.webgazerLoadError = true;"></script>
    <script src="tracker.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #020617;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        #app-container {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column;
        }
        #game-canvas {
            display: block; width: 100%; height: 100%;
        }
        .hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            pointer-events: none; z-index: 50;
            display: flex; justify-content: space-between;
            align-items: flex-start;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 24px; font-weight: 800; color: #38bdf8; font-style: italic; }
        
        #game-overlay {
            position: absolute; inset: 0; z-index: 100;
            background: rgba(2, 6, 23, 0.85);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; p: 20px;
        }
        
        .btn-premium {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 16px 40px; border-radius: 12px;
            font-weight: 700; font-size: 18px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99, 102, 241, 0.6); }
        .btn-premium:active { transform: translateY(0); }

        #debug-land-canvas { display: none; } /* Managed by tracker.js */
        
        .lane-indicator {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 40px; opacity: 0.3;
        }
        .lane-dot { width: 4px; height: 4px; background: cyan; border-radius: 50%; }
        .lane-dot.active { transform: scale(3); opacity: 1; box-shadow: 0 0 10px cyan; transition: all 0.2s; }

        /* Calibration Styles */
        #calib-overlay {
            position: absolute; inset: 0; z-index: 200;
            background: rgba(2, 6, 23, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .calib-crosshair {
            width: 60px; height: 60px; border: 2px solid #38bdf8; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="hud">
            <div class="glass-panel">
                <div class="stat-label">Ships In Fleet</div>
                <div id="ship-count" class="stat-value">1</div>
            </div>
            <div class="glass-panel">
                <div class="stat-label">Sector Score</div>
                <div id="score" class="stat-value text-amber-400">0</div>
            </div>
        </div>

        <div class="lane-indicator">
            <div id="lane-0" class="lane-dot active"></div>
            <div id="lane-1" class="lane-dot"></div>
        </div>

        <!-- Start/Game Over Overlay -->
        <div id="game-overlay">
            <h1 class="text-6xl font-black italic mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 uppercase tracking-tighter">Star Horde</h1>
            <p class="text-slate-400 max-w-sm mb-4">Navigate the 2.5D expanse. Gather your fleet. Survive the invasion.</p>
            
            <div id="loading-status" class="mb-8 text-xs font-mono text-indigo-400 border border-indigo-400/20 px-4 py-2 rounded bg-indigo-400/5">
                Ready for testing.
            </div>

            <button id="start-btn" class="btn-premium">INITIATE MISSION</button>
            <p class="mt-4 text-[10px] text-slate-500 uppercase tracking-widest">Control: Mouse / Touch</p>
            <button onclick="window.location.href='index.html'" class="mt-8 text-xs text-slate-500 uppercase tracking-widest hover:text-white transition-colors">Abort to Menu</button>
        </div>

        <!-- Calibration Overlay -->
        <div id="calib-overlay" class="hidden">
            <h2 class="text-2xl font-bold mb-2">Aligning Sensors</h2>
            <p id="calib-status" class="text-cyan-400 mb-2">Move your head to the center</p>
            <p id="calib-hint" class="text-xs text-slate-500 mb-8">Look at the crosshair and hold still</p>
            <div class="w-full h-1 bg-slate-800 max-w-[200px] rounded-full overflow-hidden">
                <div id="nose-calib-progress" class="h-full bg-indigo-500 transition-all" style="width: 0%"></div>
            </div>
            <div class="calib-crosshair"></div>
        </div>

        <div id="calib-nose-dot" style="position: absolute; width:10px; height:10px; background:cyan; border-radius:50%; pointer-events:none; z-index:250; display:none;"></div>

        <!-- Tracker.js Placeholders -->
        <div id="intro-overlay" class="hidden"></div>
        <div id="intro-error-box" class="hidden"></div>
        <div id="status-box" class="hidden">
            <p id="loading-msg"></p>
            <p id="action-msg"></p>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>

    <script>
        // --- GAME CONFIG ---
        const LANE_X = [-2.8, 2.8];
        const SPAWN_SPEED = 0.25;
        const SHOOT_COOLDOWN = 12; // frames
        
        // --- THREE.JS SETUP ---
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        camera.position.set(0, 18, 12);
        camera.lookAt(0, 0, -2);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334155, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // Background Starfield
        const starGeo = new THREE.BufferGeometry();
        const starCount = 4000;
        const starPos = new Float32Array(starCount * 3);
        const starSpeeds = new Float32Array(starCount);
        for(let i=0; i<starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 120;
            starPos[i*3+1] = (Math.random() - 0.5) * 60;
            starPos[i*3+2] = (Math.random() - 0.5) * 200;
            starSpeeds[i] = Math.random() * 0.8 + 0.2;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- GAME OBJECTS & STATE ---
        let gameState = 'MENU'; 
        let score = 0;
        let fleetCount = 1;
        let currentLane = 0; 
        let lerpX = 0;
        let shootTimer = 0;
        
        const fleetGroup = new THREE.Group();
        scene.add(fleetGroup);
        
        const projectiles = [];
        const entities = []; 

        const shipMat = new THREE.MeshPhongMaterial({ color: 0x4f46e5, shininess: 80, emissive: 0x1e1b4b });
        const enemyMat = new THREE.MeshPhongMaterial({ color: 0xe11d48, emissive: 0x4c0519 });
        const powerupMat = new THREE.MeshPhongMaterial({ color: 0x10b981, emissive: 0x064e3b });
        const projMat = new THREE.MeshBasicMaterial({ color: 0x22d3ee });

        function createShipMesh() {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.3, 1.0), shipMat);
            group.add(body);
            
            const wingGeo = new THREE.BoxGeometry(1.4, 0.05, 0.5);
            const wing = new THREE.Mesh(wingGeo, shipMat);
            wing.position.y = -0.05;
            group.add(wing);

            const cockpit = new THREE.Mesh(new THREE.SphereGeometry(0.25, 12, 12), new THREE.MeshPhongMaterial({ color: 0x7dd3fc, transparent: true, opacity: 0.9 }));
            cockpit.position.set(0, 0.15, 0.2);
            cockpit.scale.set(1, 0.4, 1.2);
            group.add(cockpit);

            return group;
        }

        function updateFleet() {
            while(fleetGroup.children.length > 0) fleetGroup.remove(fleetGroup.children[0]);
            
            const shipsPerRow = 4;
            for(let i=0; i<fleetCount; i++) {
                const ship = createShipMesh();
                const row = Math.floor(i / shipsPerRow);
                const col = i % shipsPerRow;
                
                const shipsInThisRow = Math.min(shipsPerRow, fleetCount - row * shipsPerRow);
                const rowXOffset = (shipsInThisRow - 1) * 0.7;
                
                ship.position.set(col * 1.4 - rowXOffset, 0, row * 1.6);
                fleetGroup.add(ship);
            }
        }

        function spawnEntity() {
            const lane = Math.random() > 0.5 ? 1 : 0;
            const isEnemy = Math.random() > 0.3; // 70% enemies
            let mesh;
            let type;
            let val = 0;

            if(isEnemy) {
                mesh = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.2, 4), enemyMat);
                mesh.rotation.x = Math.PI;
                type = 'ENEMY';
            } else {
                // Powerup - Starts as negative? 
                // "Some powerups will start out as negatives, but the more hits the hero scores on them the better they become."
                val = -Math.floor(Math.random() * 5) - 1; // -1 to -5
                mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 1), powerupMat);
                type = 'POWERUP';
                
                // Add value text
                const canvasLabel = document.createElement('canvas');
                const ctx = canvasLabel.getContext('2d');
                canvasLabel.width = 64; canvasLabel.height = 64;
                ctx.fillStyle = 'white'; ctx.font = 'bold 48px Inter'; ctx.textAlign = 'center';
                ctx.fillText(val, 32, 48);
                const texture = new THREE.CanvasTexture(canvasLabel);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
                sprite.position.y = 1.2;
                sprite.scale.set(1.5, 1.5, 1);
                mesh.add(sprite);
                mesh.userData.val = val;
                mesh.userData.label = sprite;
                mesh.userData.canvas = canvasLabel;
            }

            mesh.position.set(LANE_X[lane], 0, -50);
            mesh.userData.type = type;
            mesh.userData.lane = lane;
            
            scene.add(mesh);
            entities.push(mesh);
        }

        function updatePowerupLabel(mesh) {
            const canvas = mesh.userData.canvas;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 64, 64);
            ctx.fillStyle = mesh.userData.val >= 0 ? '#10b981' : '#f43f5e';
            ctx.font = 'bold 48px Inter'; ctx.textAlign = 'center';
            ctx.fillText(mesh.userData.val > 0 ? '+' + mesh.userData.val : mesh.userData.val, 32, 48);
            mesh.userData.label.material.map.needsUpdate = true;
        }

        function shoot() {
            fleetGroup.children.forEach(ship => {
                const worldPos = new THREE.Vector3();
                ship.getWorldPosition(worldPos);
                
                const proj = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), projMat);
                proj.position.copy(worldPos);
                proj.position.z -= 1.0;
                scene.add(proj);
                projectiles.push(proj);
            });
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            const govl = document.getElementById('game-overlay');
            govl.classList.remove('hidden');
            govl.querySelector('h1').innerText = "FLEET DESTROYED";
            govl.querySelector('p').innerText = "Sector Score: " + score;
            govl.querySelector('button').innerText = "RESTART MISSION";
        }

        // --- CORE LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            if(gameState === 'PLAYING') {
                // Background scroll
                const positions = stars.geometry.attributes.position.array;
                for(let i=0; i<starCount; i++) {
                    positions[i*3+2] += starSpeeds[i];
                    if(positions[i*3+2] > 20) positions[i*3+2] = -180;
                }
                stars.geometry.attributes.position.needsUpdate = true;

                // Face Tracking logic
                if(FaceTracker.cursorX !== -100) {
                    // Simple logic: screen center is lane divider
                    currentLane = FaceTracker.cursorX > window.innerWidth / 2 ? 1 : 0;
                    document.getElementById('lane-0').className = currentLane === 0 ? 'lane-dot active' : 'lane-dot';
                    document.getElementById('lane-1').className = currentLane === 1 ? 'lane-dot active' : 'lane-dot';
                }

                // Smooth lane lerp
                lerpX += (LANE_X[currentLane] - lerpX) * 0.15;
                fleetGroup.position.x = lerpX;
                
                // Tilting effect
                fleetGroup.rotation.z = (lerpX - LANE_X[currentLane]) * 0.2;

                // Spawning
                if(Math.random() < 0.02) spawnEntity();

                // Shooting
                shootTimer++;
                if(shootTimer >= SHOOT_COOLDOWN) {
                    shootTimer = 0;
                    shoot();
                }

                // Update Projectiles
                for(let i=projectiles.length-1; i>=0; i--) {
                    const p = projectiles[i];
                    p.position.z -= 1.0;
                    
                    if(p.position.z < -60) {
                        scene.remove(p);
                        projectiles.splice(i, 1);
                        continue;
                    }

                    // Collision with entities
                    for(let j=entities.length-1; j>=0; j--) {
                        const e = entities[j];
                        const dist = p.position.distanceTo(e.position);
                        if(dist < 1.5) {
                            if(e.userData.type === 'ENEMY') {
                                // Destroy enemy
                                scene.remove(e);
                                entities.splice(j, 1);
                                score += 100;
                                document.getElementById('score').innerText = score;
                            } else {
                                // Ripen powerup
                                e.userData.val++;
                                updatePowerupLabel(e);
                            }
                            scene.remove(p);
                            projectiles.splice(i, 1);
                            break;
                        }
                    }
                }

                // Update Entities
                const time = Date.now() * 0.005;
                for(let i=entities.length-1; i>=0; i--) {
                    const e = entities[i];
                    e.position.z += 0.4;
                    
                    // Simple pulse animation
                    const scale = 1 + Math.sin(time + i) * 0.1;
                    e.scale.set(scale, scale, scale);
                    if(e.userData.type === 'ENEMY') e.rotation.y += 0.05;
                    else e.rotation.y -= 0.02;
                    
                    // Collision with fleet
                    if(e.position.z > -1 && e.position.z < 2) {
                        if(Math.abs(e.position.x - lerpX) < 2) {
                            // Interaction
                            if(e.userData.type === 'ENEMY') {
                                fleetCount--;
                            } else {
                                fleetCount += e.userData.val;
                            }
                            
                            scene.remove(e);
                            entities.splice(i, 1);
                            
                            if(fleetCount <= 0) {
                                gameOver();
                            } else {
                                updateFleet();
                                document.getElementById('ship-count').innerText = fleetCount;
                                score += e.userData.type === 'POWERUP' ? 50 : 0;
                                document.getElementById('score').innerText = score;
                            }
                            continue;
                        }
                    }

                    // Pass player condition
                    if(e.position.z > 5) {
                        if(e.userData.type === 'ENEMY') {
                            fleetCount--;
                            document.getElementById('ship-count').innerText = fleetCount;
                            if(fleetCount <= 0) gameOver();
                            else updateFleet();
                        }
                        scene.remove(e);
                        entities.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // --- HANDLERS ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('start-btn').onclick = () => {
            const govl = document.getElementById('game-overlay');
            govl.style.display = 'none';
            
            gameState = 'PLAYING';
            resetGame();
        };

        // Mouse/Touch Control Fallback
        window.addEventListener('pointermove', (e) => {
            FaceTracker.cursorX = e.clientX;
            FaceTracker.cursorY = e.clientY;
        });

        function resetGame() {
            score = 0;
            fleetCount = 1;
            entities.forEach(e => scene.remove(e));
            projectiles.forEach(p => scene.remove(p));
            entities.length = 0;
            projectiles.length = 0;
            updateFleet();
            document.getElementById('score').innerText = "0";
            document.getElementById('ship-count').innerText = "1";
            lerpX = 0;
            currentLane = 0;
        }

        // Kick off loop
        updateFleet();
        animate();

        // Initialize AI on load like other games for better "warm-up"
        window.addEventListener('load', () => {
            const status = document.getElementById('loading-status');
            if (status) status.innerText = "Loading AI Core...";
            
            FaceTracker.init().then(success => {
                if (status) status.innerText = success ? "AI Systems Online." : "AI Failed. Falling back to Mouse.";
            }).catch(err => {
                if (status) status.innerText = "Load Error: " + err.message;
            });
        });
    </script>
</body>
</html>
