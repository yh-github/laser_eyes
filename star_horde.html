<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Star Horde - Laser Eyes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="shared.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="tracker.js" defer></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #020617;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        #app-container {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column;
        }
        #game-canvas { display: block; width: 100%; height: 100%; }

        .hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            pointer-events: none; z-index: 50;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px;
            border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 24px; font-weight: 800; color: #38bdf8; font-style: italic; }
        .stat-value.amber { color: #fbbf24; }

        #game-overlay {
            position: absolute; inset: 0; z-index: 100;
            background: rgba(2,6,23,0.85);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        #overlay-title {
            font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900;
            font-style: italic; margin-bottom: 1rem; letter-spacing: -0.04em;
            text-transform: uppercase;
            background: linear-gradient(90deg, #818cf8, #38bdf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #overlay-sub {
            color: #94a3b8; max-width: 24rem; margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .btn-premium {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 16px 40px; border-radius: 12px;
            font-weight: 700; font-size: 18px; color: white; border: none; cursor: pointer;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4); transition: all 0.2s;
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.6); }
        .btn-premium:active { transform: translateY(0); }
        .btn-premium.disabled {
            background: #1e293b; color: #475569;
            box-shadow: none; pointer-events: none; opacity: 0.6;
        }
        .btn-secondary {
            background: transparent; border: 1px solid rgba(99,102,241,0.3);
            color: #818cf8; padding: 10px 24px; border-radius: 10px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; margin-top: 12px;
        }
        .btn-secondary:hover { background: rgba(99,102,241,0.1); border-color: #818cf8; }

        .ctrl-hint {
            font-size: 10px; color: #475569; text-transform: uppercase;
            letter-spacing: 0.1em; margin-top: 1rem;
        }
        .abort-link {
            font-size: 12px; color: #475569; text-transform: uppercase;
            letter-spacing: 0.1em; margin-top: 2rem; cursor: pointer;
            border: none; background: none; transition: color 0.2s;
        }
        .abort-link:hover { color: white; }

        #debug-land-canvas { display: none; }

        .lane-indicator {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 40px; opacity: 0.3;
        }
        .lane-dot { width: 4px; height: 4px; background: cyan; border-radius: 50%; }
        .lane-dot.active { transform: scale(3); opacity: 1; box-shadow: 0 0 10px cyan; transition: all 0.2s; }

        /* AI Loading Overlay */
        #ai-load-overlay {
            position: absolute; inset: 0; z-index: 300;
            background: rgba(2,6,23,0.97);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        #ai-load-overlay.visible { display: flex; }
        #ai-load-title {
            font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #38bdf8;
        }
        #ai-load-status {
            font-size: 0.75rem; font-family: monospace;
            color: #818cf8; margin-bottom: 1rem;
            border: 1px solid rgba(99,102,241,0.2);
            padding: 8px 16px; border-radius: 8px;
            background: rgba(99,102,241,0.05);
            animation: pulse-status 2s infinite;
        }

        /* Calibration Styles */
        #calib-overlay {
            position: absolute; inset: 0; z-index: 200;
            background: rgba(2,6,23,0.98);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .calib-crosshair {
            width: 60px; height: 60px; border: 2px solid #38bdf8; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
        }

        @keyframes pulse-status {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        #progress-bar-container {
            width: 240px; height: 4px;
            background: rgba(99,102,241,0.1);
            border-radius: 2px; overflow: hidden; margin-top: 12px;
        }
        #progress-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #6366f1, #38bdf8);
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="hud">
            <div class="glass-panel">
                <div class="stat-label">Ships In Fleet</div>
                <div id="ship-count" class="stat-value">1</div>
            </div>
            <div class="glass-panel">
                <div class="stat-label">Sector Score</div>
                <div id="score" class="stat-value amber">0</div>
            </div>
        </div>

        <div class="lane-indicator">
            <div id="lane-0" class="lane-dot active"></div>
            <div id="lane-1" class="lane-dot"></div>
        </div>

        <!-- Start/Game Over Overlay -->
        <div id="game-overlay">
            <div id="overlay-title">Star Horde</div>
            <p id="overlay-sub">Navigate the 2.5D expanse. Gather your fleet. Survive the invasion.</p>

            <button id="start-btn" class="btn-premium">INITIATE MISSION</button>
            <button id="ai-mode-btn" class="btn-secondary">⚡ Enable Head Tracking (AI)</button>
            <p class="ctrl-hint">Control: Mouse / Touch / Head</p>
            <button onclick="window.location.href='index.html'" class="abort-link">Abort to Menu</button>
        </div>

        <!-- AI Loading Overlay (shown only when user opts into head tracking) -->
        <div id="ai-load-overlay">
            <div id="ai-load-title">Booting Neural Core</div>
            <div id="ai-load-status">Initializing...</div>
            <div id="progress-bar-container">
                <div id="progress-bar-fill"></div>
            </div>
        </div>

        <!-- Calibration Overlay -->
        <div id="calib-overlay">
            <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem">Aligning Sensors</h2>
            <p id="calib-status" style="color:#38bdf8;margin-bottom:0.5rem">Move your head to the center</p>
            <p id="calib-hint" style="font-size:0.75rem;color:#64748b;margin-bottom:2rem">Look at the crosshair and hold still</p>
            <div style="width:200px;height:4px;background:#1e293b;border-radius:2px;overflow:hidden">
                <div id="nose-calib-progress" style="height:100%;background:#6366f1;transition:width 0.3s;width:0%"></div>
            </div>
            <div class="calib-crosshair"></div>
        </div>

        <div id="calib-nose-dot" style="position:absolute;width:10px;height:10px;background:cyan;border-radius:50%;pointer-events:none;z-index:250;display:none"></div>

        <!-- Tracker.js Placeholders -->
        <div id="intro-overlay" style="display:none"></div>
        <div id="intro-error-box" style="display:none"></div>
        <div id="status-box" style="display:none">
            <p id="loading-msg"></p>
            <p id="action-msg"></p>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>

    <script>
        // --- GAME CONFIG ---
        const LANE_X = [-2.8, 2.8];
        const SPAWN_SPEED = 0.25;
        const SHOOT_COOLDOWN = 40; // Significantly slower base rate
        const MAX_FLEET_COUNT = 24; // Increased cap for more "Horde" feeling
        const LANE_LERP_FACTOR = 0.08;
        
        // --- THREE.JS SETUP ---
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        camera.position.set(0, 18, 12);
        camera.lookAt(0, 0, -2);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334155, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // Background Starfield — fewer particles on mobile
        const isMobile = navigator.maxTouchPoints > 0 && window.innerWidth < 768;
        const starCount = isMobile ? 800 : 3000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        const starSpeeds = new Float32Array(starCount);
        for(let i=0; i<starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 120;
            starPos[i*3+1] = (Math.random() - 0.5) * 60;
            starPos[i*3+2] = (Math.random() - 0.5) * 200;
            starSpeeds[i] = Math.random() * 0.2 + 0.05;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- GAME OBJECTS & STATE ---
        let gameState = 'MENU'; 
        let score = 0;
        let fleetCount = 1;
        let shieldCount = 0;
        let currentLane = 0; 
        let lerpX = 0;
        let shootTimer = 0;
        
        let gameStartTime = 0;
        let lastDeathTime = 0;
        let hordeLane = 0; // The lane with the swarm
        let laneSwapTimer = 0;
        
        const fleetGroup = new THREE.Group();
        scene.add(fleetGroup);
        
        const projectiles = [];
        const entities = []; 

        const shipMat = new THREE.MeshPhongMaterial({ color: 0x4f46e5, shininess: 80, emissive: 0x1e1b4b });
        const enemyMat = new THREE.MeshPhongMaterial({ color: 0xe11d48, emissive: 0x4c0519 });
        const neutralMat = new THREE.MeshPhongMaterial({ color: 0x64748b, emissive: 0x0f172a }); // Neutrals are now gray/stone
        const powerupMat = new THREE.MeshPhongMaterial({ color: 0x10b981, emissive: 0x064e3b });
        const shieldMat = new THREE.MeshPhongMaterial({ color: 0x38bdf8, emissive: 0x075985, transparent: true, opacity: 0.4 });
        const projMat = new THREE.MeshBasicMaterial({ color: 0x22d3ee });

        function createShipMesh() {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.3, 1.0), shipMat);
            group.add(body);
            
            const wingGeo = new THREE.BoxGeometry(1.4, 0.05, 0.5);
            const wing = new THREE.Mesh(wingGeo, shipMat);
            wing.position.y = -0.05;
            group.add(wing);

            const cockpit = new THREE.Mesh(new THREE.SphereGeometry(0.25, 12, 12), new THREE.MeshPhongMaterial({ color: 0x7dd3fc, transparent: true, opacity: 0.9 }));
            cockpit.position.set(0, 0.15, 0.2);
            cockpit.scale.set(1, 0.4, 1.2);
            group.add(cockpit);

            return group;
        }

        function updateFleet() {
            while(fleetGroup.children.length > 0) fleetGroup.remove(fleetGroup.children[0]);
            
            const shipsPerRow = 4;
            for(let i=0; i<fleetCount; i++) {
                const ship = createShipMesh();
                const row = Math.floor(i / shipsPerRow);
                const col = i % shipsPerRow;
                
                const shipsInThisRow = Math.min(shipsPerRow, fleetCount - row * shipsPerRow);
                const rowXOffset = (shipsInThisRow - 1) * 0.7;
                
                ship.position.set(col * 1.4 - rowXOffset, 0, row * 1.6);
                fleetGroup.add(ship);
            }

            // Update Shield Mesh
            if(shieldCount > 0) {
                const shield = new THREE.Mesh(new THREE.SphereGeometry(3.5, 32, 32), shieldMat);
                shield.position.set(0, 0, 1.5);
                fleetGroup.add(shield);
            }

            fleetGroup.position.z = 6; // Move ship lower on screen
        }

        function getDifficultyMetrics() {
            const now = Date.now();
            const elapsedMins = (now - gameStartTime) / 60000;
            const heroPower = fleetCount + (shieldCount * 2);
            
            // Dynamic recovery: reduce pressure if recently hit
            const timeSinceDeath = now - lastDeathTime;
            const recoveryFactor = Math.max(0, 1 - (timeSinceDeath / 10000)); // 10s recovery window
            
            const baseDiff = elapsedMins * 1.5 + (heroPower * 0.5);
            const intensity = Math.max(0.2, baseDiff * (1 - recoveryFactor * 0.5));

            return {
                hordeDensity: 0.05 + Math.min(0.25, intensity * 0.03),
                supportDensity: 0.02 + Math.min(0.08, intensity * 0.01),
                enemyHP: Math.floor(1 + intensity * 0.4),
                neutralHP: Math.floor(8 + intensity * 2.5), // Buffed neutrals significantly
                speed: Math.min(0.35, 0.08 + intensity * 0.015),
                projectileSpeed: Math.min(1.0, 0.4 + intensity * 0.02),
                sizeScale: 1 + Math.min(1.5, intensity * 0.05)
            };
        }

        function addEntityToScene(x, z, type, hp, val, metrics) {
            let mesh;
            if(type === 'ENEMY') {
                mesh = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.2, 4), enemyMat);
                mesh.rotation.x = Math.PI;
            } else if(type === 'NEUTRAL') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), neutralMat);
            } else {
                mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 1), powerupMat);
            }

            if(type === 'POWERUP') {
                const canvasLabel = document.createElement('canvas');
                const ctx = canvasLabel.getContext('2d');
                canvasLabel.width = 64; canvasLabel.height = 64;
                ctx.fillStyle = 'white'; ctx.font = 'bold 48px Inter'; ctx.textAlign = 'center';
                ctx.fillText(val, 32, 48);
                const texture = new THREE.CanvasTexture(canvasLabel);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
                sprite.position.y = 1.2;
                sprite.scale.set(1.5, 1.5, 1);
                mesh.add(sprite);
                mesh.userData.val = val;
                mesh.userData.label = sprite;
                mesh.userData.canvas = canvasLabel;
            }

            mesh.position.set(x, 0, z);
            mesh.userData.type = type;
            mesh.userData.hp = hp;
            mesh.userData.maxHP = hp;
            
            const scale = metrics.sizeScale;
            mesh.scale.set(scale, scale, scale);
            
            scene.add(mesh);
            entities.push(mesh);
        }

        function spawnEntity() {
            const metrics = getDifficultyMetrics();
            const lane = Math.random() > 0.5 ? 1 : 0;
            const isHordeLane = lane === hordeLane;
            const laneX = LANE_X[lane];
            
            if(isHordeLane) {
                if(Math.random() > metrics.hordeDensity) return;
                
                // Spawn a BUNCH / CLUSTER
                const clusterSize = Math.floor(Math.random() * 3) + 1; // 1 to 3 enemies side-by-side
                const spread = 1.2 * metrics.sizeScale;
                for(let i=0; i<clusterSize; i++) {
                    const xOffset = (i - (clusterSize-1)/2) * spread;
                    addEntityToScene(laneX + xOffset, -60, 'ENEMY', metrics.enemyHP, 0, metrics);
                }
            } else {
                if(Math.random() > metrics.supportDensity) return;
                
                const isPowerup = Math.random() < 0.15;
                if(isPowerup) {
                    const val = -Math.floor(Math.random() * 3) - 1; 
                    addEntityToScene(laneX, -60, 'POWERUP', 1, val, metrics);
                } else {
                    addEntityToScene(laneX, -60, 'NEUTRAL', metrics.neutralHP, 0, metrics);
                }
            }
        }

        function updatePowerupLabel(mesh) {
            const canvas = mesh.userData.canvas;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 64, 64);
            ctx.fillStyle = mesh.userData.val >= 0 ? '#10b981' : '#f43f5e';
            ctx.font = 'bold 48px Inter'; ctx.textAlign = 'center';
            ctx.fillText(mesh.userData.val > 0 ? '+' + mesh.userData.val : mesh.userData.val, 32, 48);
            mesh.userData.label.material.map.needsUpdate = true;
        }

        function shoot() {
            const metrics = getDifficultyMetrics();
            fleetGroup.children.forEach(ship => {
                const worldPos = new THREE.Vector3();
                ship.getWorldPosition(worldPos);
                
                const proj = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), projMat);
                proj.position.copy(worldPos);
                proj.position.z -= 1.0;
                proj.userData.speed = metrics.projectileSpeed;
                scene.add(proj);
                projectiles.push(proj);
            });
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            const govl = document.getElementById('game-overlay');
            govl.classList.remove('hidden');
            govl.querySelector('h1').innerText = "FLEET DESTROYED";
            govl.querySelector('p').innerText = "Sector Score: " + score;
            govl.querySelector('button').innerText = "RESTART MISSION";
        }

        // --- CORE LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            if(gameState === 'PLAYING') {
                // Background scroll
                const positions = stars.geometry.attributes.position.array;
                for(let i=0; i<starCount; i++) {
                    positions[i*3+2] += starSpeeds[i];
                    if(positions[i*3+2] > 20) positions[i*3+2] = -180;
                }
                stars.geometry.attributes.position.needsUpdate = true;

                // Face Tracking logic
                if(FaceTracker.cursorX !== -100) {
                    // Simple logic: screen center is lane divider
                    currentLane = FaceTracker.cursorX > window.innerWidth / 2 ? 1 : 0;
                    document.getElementById('lane-0').className = currentLane === 0 ? 'lane-dot active' : 'lane-dot';
                    document.getElementById('lane-1').className = currentLane === 1 ? 'lane-dot active' : 'lane-dot';
                }

                // Smooth lane lerp
                lerpX += (LANE_X[currentLane] - lerpX) * LANE_LERP_FACTOR;
                fleetGroup.position.x = lerpX;
                
                // Tilting effect
                fleetGroup.rotation.z = (lerpX - LANE_X[currentLane]) * 0.2;

                // Spawning
                spawnEntity(); 

                // Lane Swapping
                laneSwapTimer++;
                if(laneSwapTimer > 600) { // ~10-15 seconds
                    laneSwapTimer = 0;
                    hordeLane = 1 - hordeLane;
                }

                // Shooting
                shootTimer++;
                if(shootTimer >= SHOOT_COOLDOWN) {
                    shootTimer = 0;
                    shoot();
                }

                // Update Projectiles
                for(let i=projectiles.length-1; i>=0; i--) {
                    const p = projectiles[i];
                    p.position.z -= p.userData.speed;
                    
                    if(p.position.z < -70) {
                        scene.remove(p);
                        projectiles.splice(i, 1);
                        continue;
                    }

                    // Collision with entities
                    for(let j=entities.length-1; j>=0; j--) {
                        const e = entities[j];
                        const dist = p.position.distanceTo(e.position);
                        if(dist < 1.8 * e.scale.x) { // Account for scaling
                            if(e.userData.type === 'ENEMY' || e.userData.type === 'NEUTRAL') {
                                e.userData.hp--;
                                if(e.userData.hp <= 0) {
                                    scene.remove(e);
                                    entities.splice(j, 1);
                                    score += e.userData.type === 'ENEMY' ? 100 : 250;
                                    document.getElementById('score').innerText = score;
                                } else {
                                    // Visual flash on hit
                                    e.material.emissiveIntensity = 2;
                                    setTimeout(() => { if(e.material) e.material.emissiveIntensity = 1; }, 50);
                                }
                            } else {
                                // Powerup ripening
                                e.userData.val++;
                                updatePowerupLabel(e);
                            }
                            scene.remove(p);
                            projectiles.splice(i, 1);
                            break;
                        }
                    }
                }

                // Update Entities
                const metrics = getDifficultyMetrics();
                const time = Date.now() * 0.005;
                for(let i=entities.length-1; i>=0; i--) {
                    const e = entities[i];
                    e.position.z += metrics.speed;
                    
                    // Simple pulse animation
                    const pulse = 1 + Math.sin(time + i) * 0.05;
                    e.scale.x = metrics.sizeScale * pulse;
                    e.scale.y = metrics.sizeScale * pulse;
                    e.scale.z = metrics.sizeScale * pulse;
                    
                    if(e.userData.type === 'ENEMY') e.rotation.y += 0.05;
                    else e.rotation.y -= 0.02;
                    
                    // Collision with fleet
                    if(e.position.z > 5 && e.position.z < 8) {
                        if(Math.abs(e.position.x - lerpX) < 4 * metrics.sizeScale) {
                            // Interaction
                            if(e.userData.type === 'ENEMY' || e.userData.type === 'NEUTRAL') {
                                lastDeathTime = Date.now();
                                if(shieldCount > 0) {
                                    shieldCount--;
                                } else {
                                    fleetCount--;
                                }
                            } else {
                                // Powerup logic
                                if(fleetCount < MAX_FLEET_COUNT) {
                                    fleetCount = Math.min(MAX_FLEET_COUNT, fleetCount + (e.userData.val > 0 ? e.userData.val : 1));
                                } else {
                                    shieldCount = Math.min(3, shieldCount + 1);
                                }
                                score += 500;
                            }
                            
                            scene.remove(e);
                            entities.splice(i, 1);
                            
                            if(fleetCount <= 0) {
                                gameOver();
                            } else {
                                updateFleet();
                                document.getElementById('ship-count').innerText = fleetCount + (shieldCount > 0 ? ` (+${shieldCount}🛡️)` : '');
                                document.getElementById('score').innerText = score;
                            }
                            continue;
                        }
                    }

                    // Pass player condition
                    if(e.position.z > 10) {
                        if(e.userData.type === 'ENEMY') {
                            lastDeathTime = Date.now();
                            if(shieldCount > 0) shieldCount--;
                            else fleetCount--;
                            
                            document.getElementById('ship-count').innerText = fleetCount + (shieldCount > 0 ? ` (+${shieldCount}🛡️)` : '');
                            if(fleetCount <= 0) gameOver();
                            else updateFleet();
                        }
                        scene.remove(e);
                        entities.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // --- HANDLERS ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('start-btn').onclick = () => {
            const govl = document.getElementById('game-overlay');
            govl.style.display = 'none';
            
            gameState = 'PLAYING';
            gameStartTime = Date.now();
            resetGame();
        };

        // Mouse/Touch Control Fallback
        window.addEventListener('pointermove', (e) => {
            FaceTracker.cursorX = e.clientX;
            FaceTracker.cursorY = e.clientY;
        });

        function resetGame() {
            score = 0;
            fleetCount = 1;
            shieldCount = 0;
            entities.forEach(e => scene.remove(e));
            projectiles.forEach(p => scene.remove(p));
            entities.length = 0;
            projectiles.length = 0;
            updateFleet();
            document.getElementById('score').innerText = "0";
            document.getElementById('ship-count').innerText = "1";
            lerpX = 0;
            currentLane = 0;
        }

        // Kick off loop
        updateFleet();
        animate();

        // ---- HEAD TRACKING: LAZY LOAD ----
        // WebGazer is NOT loaded unless the user opts in.
        // This saves ~15MB of neural model downloads on every page load.
        function loadHeadTracking() {
            const overlay = document.getElementById('ai-load-overlay');
            const status = document.getElementById('ai-load-status');
            const fill = document.getElementById('progress-bar-fill');

            overlay.classList.add('visible');

            const updateAI = (msg, pct) => {
                status.innerText = msg;
                fill.style.width = pct + '%';
            };

            updateAI('Downloading Neural Engine (~15MB)...', 5);

            // Inject webgazer script dynamically
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.js';
            script.onerror = () => { window.webgazerLoadError = true; };
            script.onload = () => {
                updateAI('Requesting camera access...', 40);
                FaceTracker.init().then(success => {
                    if (success) {
                        updateAI('Head Tracking Online!', 100);
                        setTimeout(() => overlay.classList.remove('visible'), 1000);
                    } else {
                        updateAI('AI Failed — using Mouse/Touch.', 100);
                        setTimeout(() => overlay.classList.remove('visible'), 1500);
                    }
                }).catch(err => {
                    updateAI('Error: ' + err.message, 100);
                    setTimeout(() => overlay.classList.remove('visible'), 2000);
                });
            };
            document.head.appendChild(script);
        }

        document.getElementById('ai-mode-btn').addEventListener('click', () => {
            document.getElementById('ai-mode-btn').style.display = 'none';
            loadHeadTracking();
        });
    </script>
</body>
</html>
