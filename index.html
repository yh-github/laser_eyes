<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Eyes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.js" onerror="window.webgazerLoadError = true;"></script>
    <style>
        body, html { 
            margin: 0;
            padding: 0;
            height: 100%;
            height: 100dvh;
            width: 100%;
            touch-action: none; 
            overflow: hidden; 
        }
        @keyframes pulse-laser {
            0% { transform: translate(-50%, -50%) scale(0.9); box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.6); }
            50% { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 30px 10px rgba(255, 0, 0, 0.9); }
            100% { transform: translate(-50%, -50%) scale(0.9); box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.6); }
        }
        #laser-dot {
            position: fixed;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10000;
            display: none;
            box-shadow: 
                0 0 10px 2px #ff0000,
                0 0 25px 8px #ff0000,
                0 0 45px 15px rgba(255, 0, 0, 0.4);
            border: 1px solid white;
        }
        #laser-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 100%);
            transform: translate(0, -50%);
            display: none; /* Can enable for beam effect later */
        }
        .target {
            position: absolute;
            width: 70px;
            height: 70px;
            background-color: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px #3b82f6;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }
        .target::after {
            content: '';
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        .calib-point {
            position: fixed;
            width: 50px;
            height: 50px;
            background: #ef4444;
            border: 5px solid white;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10001;
            box-shadow: 0 0 30px #ef4444;
            transform: translate(-50%, -50%);
            transition: transform 0.2s;
        }
        .calib-point:hover { transform: translate(-50%, -50%) scale(1.3); }
        
        /* Force WebGazer UI to be visible and styled */
        #webgazerVideoContainer {
            display: block !important;
            position: fixed !important;
            top: 20px !important;
            left: 20px !important;
            width: 200px !important;
            height: 150px !important;
            z-index: 1000 !important;
            border: 3px solid #ef4444 !important;
            border-radius: 1rem !important;
            overflow: hidden !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6) !important;
        }
    </style>
</head>
<body class="bg-black flex items-center justify-center text-white font-sans">

    <div id="app-container" class="relative w-full h-full h-[100dvh] sm:h-[800px] sm:w-[400px] bg-gray-900 sm:rounded-[2.5rem] sm:border-8 sm:border-gray-800 overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)]">
        
        <!-- UI Overlay -->
        <div id="overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-gray-900 bg-opacity-95 p-6 text-center">
            <h1 class="text-5xl font-black mb-2 text-red-600 uppercase tracking-tighter italic">Laser Eyes</h1>
            <p class="text-md mb-8 text-gray-400">
                Destroy targets with your gaze. <br>
                <span class="text-xs">Initial 5-point calibration required.</span>
            </p>
            
            <button id="start-btn" class="w-full max-w-[280px] py-4 bg-red-600 hover:bg-red-500 rounded-xl text-xl font-bold shadow-2xl shadow-red-900/40 mb-4 transition-all active:scale-95">
                START TRACKING
            </button>
            <button id="touch-btn" class="w-full max-w-[280px] py-4 bg-gray-800 hover:bg-gray-700 rounded-xl text-xl font-bold border border-gray-700 transition-all active:scale-95 text-gray-400 text-sm">
                Touch Fallback (Mouse)
            </button>
            
            <!-- Dynamic Status / Error Box -->
            <div id="status-box" class="mt-8 p-5 rounded-2xl bg-black/40 hidden max-w-sm border border-white/10 backdrop-blur-md">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-2 h-2 rounded-full bg-red-500 animate-ping"></div>
                    <p id="loading-msg" class="text-white text-sm font-semibold"></p>
                </div>
                <p id="action-msg" class="text-gray-500 text-xs text-left leading-relaxed"></p>
            </div>
        </div>

        <!-- Calibration Overlay -->
        <div id="calib-overlay" class="absolute inset-0 z-[60] flex flex-col items-center justify-center bg-black/90 hidden">
            <div class="text-center p-10">
                <h2 class="text-3xl font-bold text-white mb-2">Calibration</h2>
                <p class="text-red-500 mb-8 font-mono tracking-widest uppercase text-xs">Look at the red dots and CLICK them</p>
                <div class="w-64 h-2 bg-gray-800 rounded-full mx-auto overflow-hidden">
                    <div id="calib-progress" class="bg-red-600 h-full w-0 transition-all duration-500"></div>
                </div>
            </div>
        </div>

        <div class="absolute top-6 left-6 z-40 flex gap-2">
            <button id="recalib-btn" class="bg-black/50 hover:bg-black/80 text-white/50 hover:text-white px-4 py-1 rounded-full text-xs font-bold border border-white/10 transition-all active:scale-95">
                RE-CALIBRATE
            </button>
        </div>

        <div class="absolute top-6 right-6 z-40 text-xl font-bold text-gray-300 bg-black/50 px-4 py-1 rounded-full pointer-events-none border border-white/10">
            Score: <span id="score" class="text-red-500">0</span>
        </div>

        <div id="game-container" class="relative w-full h-full"></div>
    </div>

    <div id="laser-dot"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const touchBtn = document.getElementById('touch-btn');
        const overlay = document.getElementById('overlay');
        const calibOverlay = document.getElementById('calib-overlay');
        const calibProgress = document.getElementById('calib-progress');
        const statusBox = document.getElementById('status-box');
        const loadingMsg = document.getElementById('loading-msg');
        const actionMsg = document.getElementById('action-msg');
        const laserDot = document.getElementById('laser-dot');
        const gameContainer = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        
        let score = 0;
        let targets = [];
        let cursorX = -100;
        let cursorY = -100;
        let loopInterval;
        let isGazerStarted = false;
        let calibCount = 0;
        const totalCalib = 9;

        // Visual locations for calibration (Viewport %)
        const calibPoints = [
            {x: 10, y: 10}, {x: 50, y: 10}, {x: 90, y: 10},
            {x: 10, y: 50}, {x: 50, y: 50}, {x: 90, y: 50},
            {x: 10, y: 90}, {x: 50, y: 90}, {x: 90, y: 90}
        ];

        // Snapping and Continuous Training Config
        const SNAPPING_DISTANCE = 150; // Pixels
        const TRAINING_INTERVAL = 10; // Record every X frames when locked
        let trainingFrameCount = 0;
        
        function showError(title, action) {
            statusBox.classList.remove('hidden');
            loadingMsg.innerText = title;
            actionMsg.innerText = action;
            startBtn.classList.remove('hidden');
            touchBtn.classList.remove('hidden');
        }

        startBtn.addEventListener('click', async () => {
            startBtn.classList.add('hidden');
            touchBtn.classList.add('hidden');
            statusBox.classList.remove('hidden');
            loadingMsg.innerText = "Initializing AI & Camera...";
            actionMsg.innerText = "Please accept camera permissions if prompted.";

            try {
                if (window.webgazerLoadError || typeof webgazer === 'undefined') {
                    throw new Error("LibraryLoadError");
                }

                // Modern WebGazer 2.1.1 setup
                webgazer.params.showVideo = true;
                webgazer.params.showPredictionPoints = true; // Show debug dots for feedback

                webgazer.setGazeListener((data) => {
                    if (data == null) return;
                    cursorX = data.x;
                    cursorY = data.y;
                    updateLaser();
                });

                loadingMsg.innerText = "Downloading AI Models (15MB)...";
                actionMsg.innerText = "This might take 10-20 seconds on first load.";
                
                await webgazer.begin();
                
                webgazer.showVideoPreview(true)
                        .showPredictionPoints(true);
                
                loadingMsg.innerText = "Calibrating Face Tracker...";
                isGazerStarted = true;

                // Move to calibration phase after a brief pause
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    startCalibration();
                }, 1500);

            } catch (err) {
                console.error(err);
                if (typeof webgazer !== 'undefined') webgazer.end();
                showError("Initialization Failed", err.message);
            }
        });

        touchBtn.addEventListener('click', () => {
            const trackMove = (e) => {
                cursorX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                cursorY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                updateLaser();
            };
            document.addEventListener('touchmove', trackMove);
            document.addEventListener('mousemove', trackMove);
            statusBox.classList.add('hidden');
            startGame();
        });

        document.getElementById('recalib-btn').addEventListener('click', () => {
            if (!isGazerStarted) return;
            startCalibration();
        });

        function startCalibration() {
            calibCount = 0;
            calibProgress.style.width = '0%';
            calibOverlay.classList.remove('hidden');
            spawnCalibPoint();
        }

        function spawnCalibPoint() {
            if (calibCount >= totalCalib) {
                calibOverlay.classList.add('hidden');
                startGame();
                return;
            }

            const p = calibPoints[calibCount];
            const pt = document.createElement('div');
            pt.className = 'calib-point';
            pt.style.left = p.x + '%';
            pt.style.top = p.y + '%';
            
            pt.onclick = () => {
                pt.remove();
                calibCount++;
                calibProgress.style.width = (calibCount / totalCalib * 100) + '%';
                spawnCalibPoint();
            };
            
            document.body.appendChild(pt);
        }

        function startGame() {
            overlay.classList.add('hidden');
            spawnTarget();
            if (!loopInterval) loopInterval = setInterval(checkCollisions, 30);
        }

        function updateLaser() {
            laserDot.style.display = 'block';
            
            let displayX = cursorX;
            let displayY = cursorY;

            // Find nearest target for visual snapping
            let nearestTarget = null;
            let minDist = SNAPPING_DISTANCE;

            targets.forEach(target => {
                const tx = parseFloat(target.dataset.vpX);
                const ty = parseFloat(target.dataset.vpY);
                const dx = cursorX - tx;
                const dy = cursorY - ty;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < minDist) {
                    minDist = dist;
                    nearestTarget = target;
                }
            });

            if (nearestTarget) {
                const tx = parseFloat(nearestTarget.dataset.vpX);
                const ty = parseFloat(nearestTarget.dataset.vpY);
                // Smooth interpolation towards target
                const weight = 0.6; // 60% snapping
                displayX = cursorX * (1 - weight) + tx * weight;
                displayY = cursorY * (1 - weight) + ty * weight;

                // Add "Locked" jitter effect
                displayX += (Math.random() - 0.5) * 5;
                displayY += (Math.random() - 0.5) * 5;
                laserDot.style.scale = 1.2 + Math.random() * 0.3;
            } else {
                laserDot.style.scale = 1;
            }

            laserDot.style.left = displayX + 'px';
            laserDot.style.top = displayY + 'px';
        }

        function spawnTarget() {
            // Transitions to one target at a time for better focus
            if (targets.length > 0) return;

            const target = document.createElement('div');
            target.className = 'target';
            
            const rect = gameContainer.getBoundingClientRect();
            const x = Math.random() * (rect.width - 100) + 50;
            const y = Math.random() * (rect.height - 100) + 50;
            
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            
            target.addEventListener('pointerdown', (e) => {
                e.preventDefault(); 
                destroyTarget(target);
            });

            // Target movement
            target.dataset.x = x;
            target.dataset.y = y;
            target.dataset.vx = (Math.random() - 0.5) * 4;
            target.dataset.vy = (Math.random() - 0.5) * 4;

            updateTargetVirtualPos(target, rect);
            target.dataset.gazeStart = ""; 

            gameContainer.appendChild(target);
            targets.push(target);
        }

        function updateTargetVirtualPos(target, rect) {
            target.dataset.vpX = rect.left + parseFloat(target.dataset.x) + 35;
            target.dataset.vpY = rect.top + parseFloat(target.dataset.y) + 35;
        }

        function destroyTarget(target) {
            target.remove();
            targets = targets.filter(t => t !== target);
            score += 10;
            scoreEl.innerText = score;
            
            spawnTarget();
            if (Math.random() > 0.4 && targets.length < 5) {
                setTimeout(spawnTarget, 400);
            }
        }

        function checkCollisions() {
            const now = Date.now();
            const requiredDuration = 1000;
            const rect = gameContainer.getBoundingClientRect();

            targets.forEach(target => {
                // Move target
                let x = parseFloat(target.dataset.x) + parseFloat(target.dataset.vx);
                let y = parseFloat(target.dataset.y) + parseFloat(target.dataset.vy);
                
                // Bounce
                if (x < 50 || x > rect.width - 100) target.dataset.vx *= -1;
                if (y < 50 || y > rect.height - 100) target.dataset.vy *= -1;
                
                target.dataset.x = x;
                target.dataset.y = y;
                target.style.left = x + 'px';
                target.style.top = y + 'px';
                updateTargetVirtualPos(target, rect);

                const tx = parseFloat(target.dataset.vpX);
                const ty = parseFloat(target.dataset.vpY);
                const dx = cursorX - tx;
                const dy = cursorY - ty;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 100) { // Increased hit area for smoother feel
                    if (!target.dataset.gazeStart) target.dataset.gazeStart = now;
                    
                    const elapsed = now - parseInt(target.dataset.gazeStart);
                    const progress = Math.min(elapsed / requiredDuration, 1);
                    
                    const scale = 1 + (progress * 0.4); 
                    const r = Math.round(59 + (180 * progress));
                    const g = Math.round(130 - (62 * progress));
                    const b = Math.round(246 - (178 * progress));
                    
                    target.style.transform = `scale(${scale})`;
                    target.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
                    target.style.boxShadow = `0 0 ${15 + (25 * progress)}px rgb(${r}, ${g}, ${b})`;
                    
                    // CONTINUOUS TRAINING: Record gaze when focused on target or very close
                    if (isGazerStarted && distance < 80) {
                        trainingFrameCount++;
                        if (trainingFrameCount >= TRAINING_INTERVAL) {
                            webgazer.recordScreenPosition(tx, ty, 'click'); // Use 'click' to trigger full training
                            trainingFrameCount = 0;
                        }
                    }

                    if (progress === 1) destroyTarget(target);
                } else {
                    target.dataset.gazeStart = "";
                    target.style.transform = 'scale(1)';
                    target.style.backgroundColor = '#3b82f6';
                    target.style.boxShadow = '0 0 15px #3b82f6';
                }
            });
            
            // Continuous laser update for smooth pursuit
            updateLaser();
        }
        
        window.addEventListener('resize', () => {
            const rect = gameContainer.getBoundingClientRect();
            targets.forEach(target => {
                const x = parseFloat(target.style.left);
                const y = parseFloat(target.style.top);
                target.dataset.vpX = rect.left + x + 35;
                target.dataset.vpY = rect.top + y + 35;
            });
        });
    </script>
</body>
</html>
