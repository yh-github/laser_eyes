<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Eyes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://webgazer.cs.brown.edu/webgazer.js" onerror="window.webgazerLoadError = true;"></script>
    <style>
        body { touch-action: none; }
        #laser-dot {
            position: fixed;
            width: 20px;
            height: 20px;
            background-color: red;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            box-shadow: 0 0 15px 5px rgba(255, 0, 0, 0.7);
            display: none;
        }
        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #3b82f6;
            transition: transform 0.05s linear, background-color 0.05s linear, box-shadow 0.05s linear;
        }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center m-0 p-0 overflow-hidden text-white font-sans">

    <div id="app-container" class="relative w-full h-full sm:w-[400px] sm:h-[800px] sm:max-h-screen bg-gray-900 sm:rounded-[2.5rem] sm:border-8 sm:border-gray-800 overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)]">
        
        <!-- UI Overlay -->
        <div id="overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-gray-900 bg-opacity-95 p-6 text-center">
            <h1 class="text-4xl font-bold mb-2 text-red-500 uppercase tracking-wider">Laser Eyes</h1>
            <p class="text-md mb-6 text-gray-300">
                Click targets to calibrate. Stare for <b class="text-white">1 second</b> to destroy them.
            </p>
            
            <button id="start-btn" class="w-full max-w-[250px] py-4 bg-red-600 hover:bg-red-700 rounded-full text-xl font-bold shadow-lg shadow-red-500/50 mb-4 transition">
                Start Tracking
            </button>
            <button id="touch-btn" class="w-full max-w-[250px] py-4 bg-blue-600 hover:bg-blue-700 rounded-full text-xl font-bold shadow-lg shadow-blue-500/50 transition">
                Touch Fallback
            </button>
            
            <!-- Dynamic Status / Error Box -->
            <div id="status-box" class="mt-6 p-4 rounded bg-gray-800 hidden max-w-sm border border-gray-700">
                <p id="loading-msg" class="text-yellow-400 text-sm font-bold mb-1"></p>
                <p id="action-msg" class="text-gray-300 text-xs"></p>
            </div>
        </div>

        <div class="absolute top-6 right-6 z-40 text-xl font-bold text-gray-300 bg-black/50 px-4 py-1 rounded-full pointer-events-none">
            Score: <span id="score" class="text-red-500">0</span>
        </div>

        <div id="game-container" class="relative w-full h-full"></div>
    </div>

    <div id="laser-dot"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const touchBtn = document.getElementById('touch-btn');
        const overlay = document.getElementById('overlay');
        const statusBox = document.getElementById('status-box');
        const loadingMsg = document.getElementById('loading-msg');
        const actionMsg = document.getElementById('action-msg');
        const laserDot = document.getElementById('laser-dot');
        const gameContainer = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        
        let score = 0;
        let targets = [];
        let cursorX = -100;
        let cursorY = -100;
        let loopInterval;
        
        function showError(title, action) {
            statusBox.classList.remove('hidden');
            loadingMsg.className = "text-red-500 text-sm font-bold mb-1";
            loadingMsg.innerText = "❌ " + title;
            actionMsg.innerText = action;
            startBtn.classList.remove('hidden');
            touchBtn.classList.remove('hidden');
        }

        startBtn.addEventListener('click', async () => {
            startBtn.classList.add('hidden');
            touchBtn.classList.add('hidden');
            statusBox.classList.remove('hidden');
            loadingMsg.className = "text-yellow-400 text-sm font-bold mb-1";
            loadingMsg.innerText = "⏳ Initializing AI and Camera...";
            actionMsg.innerText = "Please accept camera permissions if prompted.";

            try {
                if (window.webgazerLoadError || typeof webgazer === 'undefined') {
                    throw new Error("LibraryLoadError");
                }
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("SecureContextError");
                }

                await webgazer.setRegression('ridge').setTracker('TFFacemesh')
                    .setGazeListener((data) => {
                        if (data == null) return;
                        cursorX = data.x;
                        cursorY = data.y;
                        updateLaser();
                    }).begin();

                webgazer.showPredictionPoints(false);
                startGame();

            } catch (err) {
                console.error(err);
                webgazer.end(); // Clean up if partially loaded
                
                // Detailed Error Handling
                if (err.name === 'NotAllowedError' || err.message.includes('Permission')) {
                    showError("Camera Access Denied", "Please allow camera access in your browser settings/address bar and reload.");
                } else if (err.name === 'NotFoundError' || err.message.includes('Requested device not found')) {
                    showError("No Camera Found", "Ensure a camera is physically connected and enabled.");
                } else if (err.name === 'NotReadableError') {
                    showError("Camera In Use", "Another application (like Zoom) might be using your camera. Close it and retry.");
                } else if (err.message === "SecureContextError") {
                    showError("Insecure Environment", "Camera APIs require a secure context (HTTPS or localhost). Run this via a local server.");
                } else if (err.message === "LibraryLoadError" || err.message.includes('fetch')) {
                    showError("AI Model Fetch Failed", "Blocked by browser security (CORS/Sandbox). Please download WebGazer and run this file via a local web server (e.g., 'python -m http.server').");
                } else {
                    showError("Initialization Failed", err.message + ". Try using the Touch Fallback below.");
                }
            }
        });

        touchBtn.addEventListener('click', () => {
            document.addEventListener('touchmove', (e) => {
                cursorX = e.touches.clientX;
                cursorY = e.touches.clientY;
                updateLaser();
            });
            document.addEventListener('mousemove', (e) => {
                cursorX = e.clientX;
                cursorY = e.clientY;
                updateLaser();
            });
            startGame();
        });

        function startGame() {
            overlay.classList.add('hidden');
            spawnTarget();
            loopInterval = setInterval(checkCollisions, 30);
        }

        function updateLaser() {
            laserDot.style.display = 'block';
            laserDot.style.left = cursorX + 'px';
            laserDot.style.top = cursorY + 'px';
        }

        function spawnTarget() {
            const target = document.createElement('div');
            target.className = 'target';
            
            const rect = gameContainer.getBoundingClientRect();
            const x = Math.random() * (rect.width - 80) + 10;
            const y = Math.random() * (rect.height - 80) + 10;
            
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            
            target.addEventListener('pointerdown', (e) => {
                e.preventDefault(); 
                destroyTarget(target);
            });

            target.dataset.vpX = rect.left + x + 30;
            target.dataset.vpY = rect.top + y + 30;
            target.dataset.gazeStart = ""; 

            gameContainer.appendChild(target);
            targets.push(target);
        }

        function destroyTarget(target) {
            target.remove();
            targets = targets.filter(t => t !== target);
            score += 10;
            scoreEl.innerText = score;
            
            spawnTarget();
            if (Math.random() > 0.4 && targets.length < 5) {
                setTimeout(spawnTarget, 400);
            }
        }

        function checkCollisions() {
            const now = Date.now();
            const requiredDuration = 1000;

            targets.forEach(target => {
                const tx = parseFloat(target.dataset.vpX);
                const ty = parseFloat(target.dataset.vpY);
                const dx = cursorX - tx;
                const dy = cursorY - ty;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 60) {
                    if (!target.dataset.gazeStart) target.dataset.gazeStart = now;
                    
                    const elapsed = now - parseInt(target.dataset.gazeStart);
                    const progress = Math.min(elapsed / requiredDuration, 1);
                    
                    const scale = 1 + (progress * 0.4); 
                    const r = Math.round(59 + (180 * progress));
                    const g = Math.round(130 - (62 * progress));
                    const b = Math.round(246 - (178 * progress));
                    
                    target.style.transform = `scale(${scale})`;
                    target.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
                    target.style.boxShadow = `0 0 ${10 + (20 * progress)}px rgb(${r}, ${g}, ${b})`;
                    
                    if (progress === 1) destroyTarget(target);
                } else {
                    target.dataset.gazeStart = "";
                    target.style.transform = 'scale(1)';
                    target.style.backgroundColor = '#3b82f6';
                    target.style.boxShadow = '0 0 10px #3b82f6';
                }
            });
        }
        
        window.addEventListener('resize', () => {
            const rect = gameContainer.getBoundingClientRect();
            targets.forEach(target => {
                const x = parseFloat(target.style.left);
                const y = parseFloat(target.style.top);
                target.dataset.vpX = rect.left + x + 30;
                target.dataset.vpY = rect.top + y + 30;
            });
        });
    </script>
</body>
</html>
