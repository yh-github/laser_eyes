<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Eyes - Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tracker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.js"
        onerror="window.webgazerLoadError = true;"></script>
    <link rel="stylesheet" href="shared.css">
    <style>
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            width: 100%;
            max-width: 320px;
        }
        .launcher-btn {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            border-radius: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .launcher-btn:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .launcher-btn:active { transform: scale(0.95); }
        .launcher-btn .icon { font-size: 2rem; }

        .btn-standard { background: linear-gradient(135deg, #0ea5e9, #0284c7); box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4); }
        .btn-bigmouth { background: linear-gradient(135deg, #ec4899, #be185d); box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.4); }
        .btn-unclesam { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4); }
        .btn-glass { background: linear-gradient(135deg, #84cc16, #4d7c0f); box-shadow: 0 10px 20px -5px rgba(132, 204, 22, 0.4); }
        .btn-space { background: linear-gradient(135deg, #f59e0b, #b45309); box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.4); }
        .btn-star { background: linear-gradient(135deg, #6366f1, #4338ca); box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4); }
    </style>
</head>

<body class="bg-black flex items-center justify-center text-white font-sans">

    <div id="app-container"
        class="relative w-full h-full h-[100dvh] sm:h-[800px] sm:w-[400px] bg-slate-950 sm:rounded-[2.5rem] sm:border-8 sm:border-slate-900 overflow-hidden shadow-[0_0_80px_rgba(0,0,0,0.9)]">

        <!-- Intro / Permission Screen -->
        <div id="intro-overlay" class="absolute inset-0 z-[100] flex flex-col items-center justify-center bg-black p-6 text-center">
            <div class="intro-card backdrop-blur-xl bg-white/5 border border-white/10 p-8 rounded-[2rem]">
                <div class="intro-icon-container mb-6">
                    <span class="text-5xl animate-pulse">👁️</span>
                </div>
                <h2 class="text-3xl font-black text-white mb-4 tracking-tight">Laser Eyes</h2>
                <p class="text-slate-400 text-sm leading-relaxed mb-8">
                    To start your mission, the AI needs to track your gaze via the camera.
                </p>
                
                <div id="intro-status-box" class="w-full">
                    <p id="intro-loading-msg" class="text-cyan-400 text-[10px] font-black uppercase tracking-[0.2em] mb-3">Initializing Neural Link...</p>
                    <div class="loading-bar-container h-1.5 bg-slate-800 rounded-full overflow-hidden">
                        <div id="intro-loading-bar" class="loading-bar-fill bg-cyan-500 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>

                <div id="intro-error-box" class="hidden mt-6">
                    <p id="intro-error-msg" class="text-rose-500 text-xs mb-4"></p>
                    <button onclick="location.reload()" class="px-8 py-3 bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold rounded-full transition-all">RETRY</button>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="overlay" class="absolute inset-0 z-50 flex flex-col items-center p-8 pt-16 text-center bg-[radial-gradient(circle_at_top,#1e293b_0%,#020617_100%)] hidden">
            <h1 class="text-4xl font-black mb-1 text-white uppercase tracking-tighter italic">Mission Select</h1>
            <p class="text-sm mb-12 text-slate-500 font-medium">Choose your experience</p>

            <div class="menu-grid">
                <button id="launch-standard" class="launcher-btn btn-standard">
                    <span class="icon">🎯</span>
                    <span>Standard</span>
                </button>
                <button id="launch-bigmouth" class="launcher-btn btn-bigmouth">
                    <span class="icon">👄</span>
                    <span>Big Mouth</span>
                </button>
                <button id="launch-space" class="launcher-btn btn-space">
                    <span class="icon">🚀</span>
                    <span>Evaders</span>
                </button>
                <button id="launch-star" class="launcher-btn btn-star">
                    <span class="icon">👾</span>
                    <span>Horde</span>
                </button>
                <button id="launch-unclesam" class="launcher-btn btn-unclesam">
                    <span class="icon">🎩</span>
                    <span>Uncle Sam</span>
                </button>
                <button id="launch-glass" class="launcher-btn btn-glass">
                    <span class="icon">💎</span>
                    <span>The Glass</span>
                </button>
            </div>

            <!-- Global Settings (Minimal) -->
            <div class="mt-auto w-full max-w-[320px] p-6 rounded-3xl bg-white/5 border border-white/5 backdrop-blur-md">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Camera Feedback</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="camera-feed-toggle" checked>
                        <span class="slider-round"></span>
                    </label>
                </div>
                <p class="text-[9px] text-slate-600 leading-tight">Advanced face tracking settings available within each game module.</p>
            </div>
        </div>

        <div id="status-box" class="hidden">
             <p id="loading-msg"></p>
             <p id="action-msg"></p>
        </div>
        
        <div id="calib-overlay" class="hidden"></div>
    </div>

    <script>
        const camToggle = document.getElementById('camera-feed-toggle');

        camToggle.addEventListener('change', () => {
            const videoContainer = document.getElementById('webgazerVideoContainer');
            if (videoContainer) {
                videoContainer.style.setProperty('display', camToggle.checked ? 'block' : 'none', 'important');
            }
        });

        const navMap = {
            'launch-standard': 'standard.html',
            'launch-bigmouth': 'big_mouth.html',
            'launch-space': 'space_evaders.html',
            'launch-star': 'star_horde.html',
            'launch-unclesam': 'uncle_sam.html',
            'launch-glass': 'glass.html'
        };

        Object.entries(navMap).forEach(([id, url]) => {
            const btn = document.getElementById(id);
            if (btn) {
                btn.addEventListener('click', () => {
                    console.log(`Navigating to ${url}`);
                    window.location.href = url;
                });
            }
        });

        // Initialize FaceTracker just to handle permissions/loading on the launcher
        window.addEventListener('load', () => {
            const statusBox = document.getElementById('intro-status-box');
            if (statusBox) {
                statusBox.innerHTML = `
                    <button id="intro-start-btn" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl text-xl font-bold transition-all active:scale-95 mb-4 shadow-lg shadow-cyan-900/50">
                        START NEURAL LINK
                    </button>
                    <p class="text-gray-500 text-[10px]">Please allow camera access when prompted.</p>
                `;
                document.getElementById('intro-start-btn').addEventListener('click', function() {
                    this.innerText = 'INITIALIZING...';
                    this.disabled = true;
                    this.classList.add('opacity-50');
                    
                    FaceTracker.init().then(success => {
                        if (success) {
                            document.getElementById('intro-overlay').classList.add('hidden');
                            document.getElementById('overlay').classList.remove('hidden');
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
