<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Eyes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.js" onerror="window.webgazerLoadError = true;"></script>
    <style>
        body, html { 
            margin: 0;
            padding: 0;
            height: 100%;
            height: 100dvh;
            width: 100%;
            touch-action: none; 
            overflow: hidden; 
        }
        @keyframes pulse-laser {
            0% { transform: translate(-50%, -50%) scale(0.9); box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.6); }
            50% { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 30px 10px rgba(255, 0, 0, 0.9); }
            100% { transform: translate(-50%, -50%) scale(0.9); box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.6); }
        }
        #laser-dot {
            position: fixed;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10000;
            display: none;
            box-shadow: 
                0 0 10px 2px #00f2ff,
                0 0 25px 8px #00f2ff,
                0 0 45px 15px rgba(0, 242, 255, 0.4);
            border: 1px solid #e0ffff;
        }
        .target {
            position: absolute;
            width: 70px;
            height: 70px;
            background-color: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px #3b82f6;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }
        .target::after {
            content: '';
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        
        /* Force WebGazer UI to be visible and styled */
        #webgazerVideoContainer {
            display: block !important;
            position: fixed !important;
            top: 20px !important;
            left: 20px !important;
            width: 200px !important;
            height: 150px !important;
            z-index: 1000 !important;
            border: 3px solid #00f2ff !important;
            border-radius: 1rem !important;
            overflow: hidden !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6) !important;
        }

        /* Hide the green bounding box but keep the wireframe mesh */
        #webgazerVideoCanvas {
            /* This is the face detection bounding box overlay — hide it */
            display: none !important;
        }
        #webgazerFaceOverlay {
            /* This is the wireframe mesh — keep it visible */
            display: block !important;
        }
        /* Also hide WebGazer's default prediction point (we draw our own laser) */
        #webgazerGazeDot {
            display: none !important;
        }

        @keyframes target-flash {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.8) saturate(1.5); }
        }
        .flashing {
            animation: target-flash 0.8s infinite ease-in-out;
        }

        /* Calibration crosshair */
        @keyframes crosshair-pulse {
            0%, 100% { 
                transform: translate(-50%, -50%) scale(1); 
                opacity: 0.8;
                box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.15); 
                opacity: 1;
                box-shadow: 0 0 40px rgba(0, 242, 255, 0.6);
            }
        }
        .calib-crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border: 3px solid #00f2ff;
            border-radius: 50%;
            animation: crosshair-pulse 1.2s ease-in-out infinite;
            z-index: 61;
        }
        .calib-crosshair::before,
        .calib-crosshair::after {
            content: '';
            position: absolute;
            background: #00f2ff;
        }
        .calib-crosshair::before {
            width: 2px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }
        .calib-crosshair::after {
            height: 2px;
            width: 100%;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up {
            animation: fade-in-up 0.4s ease-out forwards;
        }

        /* Live nose indicator during calibration */
        #calib-nose-dot {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #22d3ee;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 62;
            display: none;
            box-shadow: 0 0 8px #22d3ee;
            transition: left 0.08s ease-out, top 0.08s ease-out;
        }
    </style>
</head>
<body class="bg-black flex items-center justify-center text-white font-sans">

    <div id="app-container" class="relative w-full h-full h-[100dvh] sm:h-[800px] sm:w-[400px] bg-gray-900 sm:rounded-[2.5rem] sm:border-8 sm:border-gray-800 overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)]">
        
        <!-- UI Overlay -->
        <div id="overlay" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-gray-900 bg-opacity-95 p-6 text-center">
            <h1 class="text-5xl font-black mb-2 text-cyan-400 uppercase tracking-tighter italic">Laser Eyes</h1>
            <p class="text-md mb-8 text-gray-400">
                Destroy targets with your gaze. <br>
                <span class="text-xs">Quick nose calibration required.</span>
            </p>
            
            <div class="flex flex-col gap-3 w-full max-w-[280px] mb-4">
                <button id="start-btn" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 rounded-xl text-xl font-bold shadow-2xl shadow-cyan-900/40 transition-all active:scale-95">
                    START
                </button>
            </div>
            
            <!-- Dynamic Status / Error Box -->
            <div id="status-box" class="mt-8 p-5 rounded-2xl bg-black/40 hidden max-w-sm border border-white/10 backdrop-blur-md">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-2 h-2 rounded-full bg-cyan-500 animate-ping"></div>
                    <p id="loading-msg" class="text-white text-sm font-semibold"></p>
                </div>
                <p id="action-msg" class="text-gray-500 text-xs text-left leading-relaxed"></p>
            </div>
        </div>

        <!-- Calibration Overlay -->
        <div id="calib-overlay" class="absolute inset-0 z-[60] flex flex-col items-center justify-center bg-black/90 hidden">
            <div id="nose-calib-ui" class="text-center p-10">
                <h2 id="calib-title" class="text-3xl font-bold text-cyan-400 mb-2">Nose Calibration</h2>
                <p id="calib-status" class="text-white mb-2 font-semibold">Detecting your face...</p>
                <p id="calib-hint" class="text-gray-400 mb-6 text-xs italic">Position your face in the camera</p>
                <div class="w-64 h-2 bg-gray-800 rounded-full mx-auto overflow-hidden">
                    <div id="nose-calib-progress" class="bg-cyan-500 h-full w-0 transition-all duration-100"></div>
                </div>
                <p id="calib-pct" class="text-cyan-400/60 text-xs mt-2 font-mono">0%</p>
            </div>
        </div>

        <div class="absolute top-6 left-6 z-40 flex gap-2">
            <button id="recalib-btn" class="bg-black/50 hover:bg-black/80 text-white/50 hover:text-white px-4 py-1 rounded-full text-xs font-bold border border-white/10 transition-all active:scale-95">
                RE-CALIBRATE
            </button>
        </div>

        <div class="absolute top-6 right-6 z-40 text-xl font-bold text-gray-300 bg-black/50 px-4 py-1 rounded-full pointer-events-none border border-white/10">
            Score: <span id="score" class="text-cyan-400">0</span>
        </div>

        <div id="game-container" class="relative w-full h-full"></div>
    </div>

    <div id="laser-dot"></div>
    <div id="calib-nose-dot"></div>

    <script>
        const overlay = document.getElementById('overlay');
        const calibOverlay = document.getElementById('calib-overlay');
        const statusBox = document.getElementById('status-box');
        const loadingMsg = document.getElementById('loading-msg');
        const actionMsg = document.getElementById('action-msg');
        const laserDot = document.getElementById('laser-dot');
        const gameContainer = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const calibNoseDot = document.getElementById('calib-nose-dot');
        
        let score = 0;
        let popCount = 0;
        let maxTargets = 1;
        let targets = [];
        let cursorX = -100;
        let cursorY = -100;
        let loopInterval;
        let isGazerStarted = false;

        // Snapping Config
        const SNAPPING_DISTANCE = 150;

        // Nose tracking state
        let noseCenter = {x: 0, y: 0};
        let noseSensitivity = 3.5;
        let noseSmoothing = 0.4;
        let lastNoseX = -100;
        let lastNoseY = -100;

        // Persist model data across sessions (prevents re-training on reload)
        window.saveDataAcrossSessions = true;

        function showError(title, action) {
            statusBox.classList.remove('hidden');
            loadingMsg.innerText = title;
            actionMsg.innerText = action;
            document.getElementById('start-btn').classList.remove('hidden');
        }

        async function initNoseTracking() {
            document.getElementById('start-btn').classList.add('hidden');
            statusBox.classList.remove('hidden');
            loadingMsg.innerText = "Initializing AI & Camera...";
            actionMsg.innerText = "Please accept camera permissions if prompted.";

            try {
                if (window.webgazerLoadError || typeof webgazer === 'undefined') {
                    throw new Error("LibraryLoadError");
                }

                webgazer.params.showVideo = true;
                webgazer.params.showPredictionPoints = false;

                // We don't use gaze prediction for nose mode, but webgazer needs a listener
                webgazer.setGazeListener(() => {});

                loadingMsg.innerText = "Downloading AI Models (15MB)...";
                actionMsg.innerText = "This might take 10-20 seconds on first load.";
                
                await webgazer.begin();
                
                webgazer.showVideoPreview(true)
                        .showPredictionPoints(false);
                
                loadingMsg.innerText = "Camera ready!";
                isGazerStarted = true;

                setTimeout(() => {
                    overlay.classList.add('hidden');
                    startNoseCalibration();
                }, 800);

            } catch (err) {
                console.error(err);
                if (typeof webgazer !== 'undefined') webgazer.end();
                showError("Initialization Failed", err.message);
            }
        }

        document.getElementById('start-btn').addEventListener('click', initNoseTracking);

        document.getElementById('recalib-btn').addEventListener('click', () => {
            if (!isGazerStarted) return;
            startNoseCalibration();
        });

        function startNoseCalibration() {
            const calibStatus = document.getElementById('calib-status');
            const calibHint = document.getElementById('calib-hint');
            const calibPct = document.getElementById('calib-pct');
            const progressBar = document.getElementById('nose-calib-progress');
            
            // Reset state
            progressBar.style.width = '0%';
            calibPct.innerText = '0%';
            calibStatus.innerText = 'Detecting your face...';
            calibHint.innerText = 'Position your face in the camera';
            calibOverlay.classList.remove('hidden');
            calibNoseDot.style.display = 'none';
            lastNoseX = -100;
            lastNoseY = -100;

            // Add crosshair target at center
            const crosshair = document.createElement('div');
            crosshair.className = 'calib-crosshair';
            document.body.appendChild(crosshair);

            let noseCalibFrames = 0;
            const targetFrames = 30; // ~1 second at 30ms interval (down from 60)
            let tempX = 0;
            let tempY = 0;
            let faceDetected = false;
            let waitingFrames = 0;

            const calibInt = setInterval(() => {
                let positions = null;
                try {
                    positions = webgazer.getTracker().getPositions();
                } catch(e) { /* tracker not ready yet */ }

                if (positions && positions.length > 60) {
                    if (!faceDetected) {
                        faceDetected = true;
                        calibStatus.innerText = '✓ Face detected!';
                        calibStatus.classList.add('fade-in-up');
                        calibHint.innerText = 'Look at the crosshair — hold still...';
                        
                        // Show live nose dot
                        calibNoseDot.style.display = 'block';
                    }

                    const nose = positions[62] || positions[37];
                    
                    // Show live nose position as feedback
                    const screenW = window.innerWidth;
                    const screenH = window.innerHeight;
                    const liveX = screenW / 2 - (nose[0] - (tempX / Math.max(noseCalibFrames, 1))) * noseSensitivity;
                    const liveY = screenH / 2 + (nose[1] - (tempY / Math.max(noseCalibFrames, 1))) * noseSensitivity;
                    calibNoseDot.style.left = (noseCalibFrames > 0 ? liveX : screenW / 2) + 'px';
                    calibNoseDot.style.top = (noseCalibFrames > 0 ? liveY : screenH / 2) + 'px';

                    // Wait a couple frames after detection before starting calibration
                    waitingFrames++;
                    if (waitingFrames < 5) return;

                    tempX += nose[0];
                    tempY += nose[1];
                    noseCalibFrames++;
                    
                    const pct = Math.round(noseCalibFrames / targetFrames * 100);
                    progressBar.style.width = pct + '%';
                    calibPct.innerText = pct + '%';

                    if (noseCalibFrames >= Math.round(targetFrames * 0.5)) {
                        calibStatus.innerText = '⏳ Almost there...';
                    }
                }

                if (noseCalibFrames >= targetFrames) {
                    clearInterval(calibInt);
                    noseCenter.x = tempX / targetFrames;
                    noseCenter.y = tempY / targetFrames;
                    
                    // Success feedback
                    calibStatus.innerText = '🎯 Calibrated!';
                    calibHint.innerText = 'Let\'s go!';
                    progressBar.style.width = '100%';
                    calibPct.innerText = '100%';
                    
                    // Haptic feedback on mobile
                    if (navigator.vibrate) navigator.vibrate(50);

                    // Brief pause to show success, then start
                    setTimeout(() => {
                        crosshair.remove();
                        calibNoseDot.style.display = 'none';
                        calibOverlay.classList.add('hidden');
                        startGame();
                    }, 500);
                }
            }, 30);
        }

        function startGame() {
            overlay.classList.add('hidden');
            spawnTarget();
            if (!loopInterval) loopInterval = setInterval(checkCollisions, 30);
        }

        function updateLaser() {
            laserDot.style.display = 'block';
            
            let displayX = cursorX;
            let displayY = cursorY;

            // Find nearest target for visual snapping
            let nearestTarget = null;
            let minDist = SNAPPING_DISTANCE;

            targets.forEach(target => {
                const tx = parseFloat(target.dataset.vpX);
                const ty = parseFloat(target.dataset.vpY);
                const dx = cursorX - tx;
                const dy = cursorY - ty;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < minDist) {
                    minDist = dist;
                    nearestTarget = target;
                }
            });

            if (nearestTarget) {
                const tx = parseFloat(nearestTarget.dataset.vpX);
                const ty = parseFloat(nearestTarget.dataset.vpY);
                // Smooth interpolation towards target
                const weight = 0.6;
                displayX = cursorX * (1 - weight) + tx * weight;
                displayY = cursorY * (1 - weight) + ty * weight;

                // Add "Locked" jitter effect
                displayX += (Math.random() - 0.5) * 5;
                displayY += (Math.random() - 0.5) * 5;
                laserDot.style.scale = 1.2 + Math.random() * 0.3;
            } else {
                laserDot.style.scale = 1;
            }

            laserDot.style.left = displayX + 'px';
            laserDot.style.top = displayY + 'px';
        }

        function spawnTarget() {
            if (targets.length >= maxTargets) return;

            const target = document.createElement('div');
            target.className = 'target';
            if (Math.random() > 0.5) target.classList.add('flashing');
            
            const rect = gameContainer.getBoundingClientRect();
            const x = Math.random() * (rect.width - 100) + 50;
            const y = Math.random() * (rect.height - 100) + 50;
            
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            
            target.addEventListener('pointerdown', (e) => {
                e.preventDefault(); 
                destroyTarget(target);
            });

            // Target movement
            target.dataset.x = x;
            target.dataset.y = y;
            target.dataset.vx = (Math.random() - 0.5) * 4;
            target.dataset.vy = (Math.random() - 0.5) * 4;

            updateTargetVirtualPos(target, rect);
            target.dataset.gazeStart = ""; 

            gameContainer.appendChild(target);
            targets.push(target);
        }

        function updateTargetVirtualPos(target, rect) {
            target.dataset.vpX = rect.left + parseFloat(target.dataset.x) + 35;
            target.dataset.vpY = rect.top + parseFloat(target.dataset.y) + 35;
        }

        function destroyTarget(target) {
            target.remove();
            targets = targets.filter(t => t !== target);
            score += 10;
            popCount++;
            scoreEl.innerText = score;
            
            // Progression: after 3 pops, allow a second target
            if (popCount >= 3) maxTargets = 2;

            spawnTarget();
            if (targets.length < maxTargets) {
                setTimeout(spawnTarget, 600);
            }
        }

        function checkCollisions() {
            const now = Date.now();
            const requiredDuration = 1000;
            const rect = gameContainer.getBoundingClientRect();

            targets.forEach(target => {
                // Move target with random jitter
                const jitterX = (Math.random() - 0.5) * 2;
                const jitterY = (Math.random() - 0.5) * 2;
                
                let x = parseFloat(target.dataset.x) + parseFloat(target.dataset.vx) + jitterX;
                let y = parseFloat(target.dataset.y) + parseFloat(target.dataset.vy) + jitterY;
                
                // Bounce
                if (x < 50 || x > rect.width - 100) target.dataset.vx *= -1;
                if (y < 50 || y > rect.height - 100) target.dataset.vy *= -1;
                
                target.dataset.x = x;
                target.dataset.y = y;
                target.style.left = x + 'px';
                target.style.top = y + 'px';
                updateTargetVirtualPos(target, rect);

                const tx = parseFloat(target.dataset.vpX);
                const ty = parseFloat(target.dataset.vpY);
                const dx = cursorX - tx;
                const dy = cursorY - ty;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 100) {
                    if (!target.dataset.gazeStart) target.dataset.gazeStart = now;
                    
                    const elapsed = now - parseInt(target.dataset.gazeStart);
                    const progress = Math.min(elapsed / requiredDuration, 1);
                    
                    const scale = 1 + (progress * 0.4); 
                    const r = Math.round(59 + (180 * progress));
                    const g = Math.round(130 - (62 * progress));
                    const b = Math.round(246 - (178 * progress));
                    
                    target.style.transform = `scale(${scale})`;
                    target.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
                    target.style.boxShadow = `0 0 ${15 + (25 * progress)}px rgb(${r}, ${g}, ${b})`;

                    if (progress === 1) destroyTarget(target);
                } else {
                    target.dataset.gazeStart = "";
                    target.style.transform = 'scale(1)';
                    target.style.backgroundColor = '#3b82f6';
                    target.style.boxShadow = '0 0 15px #3b82f6';
                }
            });
            
            updateNoseTracking();
            updateLaser();
        }

        function updateNoseTracking() {
            let positions = null;
            try {
                positions = webgazer.getTracker().getPositions();
            } catch(e) { return; }
            if (!positions || positions.length < 60) return;

            const nose = positions[62] || positions[37];
            const rawX = nose[0];
            const rawY = nose[1];

            const dx = (rawX - noseCenter.x);
            const dy = (rawY - noseCenter.y);

            const screenW = window.innerWidth;
            const screenH = window.innerHeight;

            const targetX = (screenW / 2) - (dx * noseSensitivity);
            const targetY = (screenH / 2) + (dy * noseSensitivity);

            if (lastNoseX === -100) {
                cursorX = targetX;
                cursorY = targetY;
            } else {
                cursorX = cursorX * (1 - noseSmoothing) + targetX * noseSmoothing;
                cursorY = cursorY * (1 - noseSmoothing) + targetY * noseSmoothing;
            }

            lastNoseX = cursorX;
            lastNoseY = cursorY;
        }
        
        window.addEventListener('resize', () => {
            const rect = gameContainer.getBoundingClientRect();
            targets.forEach(target => {
                const x = parseFloat(target.style.left);
                const y = parseFloat(target.style.top);
                target.dataset.vpX = rect.left + x + 35;
                target.dataset.vpY = rect.top + y + 35;
            });
        });
    </script>
</body>
</html>
